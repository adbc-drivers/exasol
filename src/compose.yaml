services:
  test-service:
    image: exasol/docker-db:2025.2.0
    healthcheck:
      # The CLI is very particular about certificate verification, and the needed fingerprint isn't stable, so check health a different way.
      test: bash -c "/opt/exasol/db-2025.2.0/bin/Console/exaplus -u sys -p exasol -encryption ON -c localhost:8563 -sql \"SELECT 1;\" 2>&1 | grep fingerprint"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - 8563:8563
    privileged: true
