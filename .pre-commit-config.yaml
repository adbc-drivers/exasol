repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 45ef068da5f21267bb2a7ec4a623092959f09ce5  # frozen: v0.14.14
  hooks:
  - id: ruff-check
    name: "ruff check"
    args: ["--extend-select", "I", "--fix"]
  - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: 63c8f8312b7559622c0d82815639671ae42132ac  # v2.4.1
  hooks:
  - id: codespell
    exclude: >
        (?x)^(
            .*Cargo\.toml$
        )$

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--enforce-all"]
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-yaml
  - id: detect-private-key
  - id: end-of-file-fixer
    exclude: '\.sln$'
  - id: mixed-line-ending
    args: [--fix=lf]
    exclude: '\.(bat|sln)$'
  - id: trailing-whitespace

- repo: https://github.com/koalaman/shellcheck-precommit
  rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d  # frozen: v0.11.0
  hooks:
  - id: shellcheck

- repo: https://github.com/adbc-drivers/dev
  rev: eb8f394c2c193cbb44ad1c348ccd036372b87394
  hooks:
  - id: rat

- repo: local
  hooks:
  - id: cargo fmt
    name: cargo fmt
    language: system
    types: [rust]
    entry: bash -c 'cd rust && cargo +stable fmt --all'
    pass_filenames: false
